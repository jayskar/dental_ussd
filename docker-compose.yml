services:
  # ---------------------------------------------------------------------------
  # Redis — session store and cache backend
  # ---------------------------------------------------------------------------
  redis:
    image: redis:7-alpine
    restart: unless-stopped
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------------------------
  # Django web application served by gunicorn
  # ---------------------------------------------------------------------------
  web:
    build:
      context: .
      target: runtime
    restart: unless-stopped
    ports:
      - "${WEB_PORT:-8000}:8000"
    env_file:
      - .env
    environment:
      # Override Redis URL to point at the compose redis service
      REDIS_URL: redis://redis:6379/0
      # Store the SQLite database on the persistent volume
      DB_DIR: /app/data
    volumes:
      # Persist SQLite database across container restarts
      - db_data:/app/data
      # Persist collected static files (useful when serving via nginx)
      - static_files:/app/staticfiles
    depends_on:
      redis:
        condition: service_healthy

  # ---------------------------------------------------------------------------
  # USSD Simulator — Vue.js SPA (jayskar/ussd-simulator@mydev)
  # The browser talks directly to the web service on localhost:8000, so no
  # special network wiring is needed inside the compose network.
  # ---------------------------------------------------------------------------
  simulator:
    build:
      context: .
      dockerfile: Dockerfile.simulator
      args:
        # VUE_APP_AUTH_TOKEN is baked into the JS bundle at build time.
        # Set this to a valid DRF auth token created in the web container:
        #   docker compose exec web python manage.py drf_create_token <username>
        VUE_APP_AUTH_TOKEN: "${VUE_APP_AUTH_TOKEN:-}"
    restart: unless-stopped
    ports:
      - "${SIMULATOR_PORT:-8081}:8081"
    depends_on:
      - web

volumes:
  redis_data:
  db_data:
  static_files:
